# Mirrors Appium: tappingItemShowsDetailWithContent()
# Taps the first item and verifies detail screen shows title and subtitle.
appId: ${APP_ID}
---
- launchApp
- assertVisible:
    id: "items_list"
- extendedWaitUntil:
    visible:
      id: "item_.*"
    timeout: 5000
- tapOn:
    id: "item_.*"
    index: 0
- assertVisible:
    id: "detail_title"
- assertVisible:
    id: "detail_subtitle"
